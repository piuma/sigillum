# Git-buildpackage config for sigillum.
# Layout: upstream code on `main`, Debian packaging on `debian/main`,
# tarballs in `../tarballs/`.
[DEFAULT]
upstream-branch = main
debian-branch = debian/main
upstream-tag = v%(version)s
debian-tag = debian/%(version)s
pristine-tar = True

[buildpackage]
export-dir = ../build-area/
tarball-dir = ../tarballs/
